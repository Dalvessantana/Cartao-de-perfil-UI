<!DOCTYPE html>

<html lang="pt-br">

<head>

   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <meta http-equiv="X-UA-Compatible" content="IE=edge">
   <title>Cartão de perfil UI Desing</title>
   <link rel="stylesheet" href="style/teste.css" />
   <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
   <link rel="shortcut icon" href="img/index-L-2.png" type="img/x-icon">

</head>

<body>
   <div class="cartao-de-perfil">
      <div class="imagem">
         <img src="img/L-1.png" alt="" class="perfil-img" />
      </div>

      <div class="text-data">
         <span class="nome">Davi Alves</span>
         <span class="trabalho">Dev & Desing</span>
      </div>

      <div class="midia-botoes">
         <a href="#" id="facebook" class="social-networks">
            <i class="bx bxl-facebook"></i>
         </a>


         <a href="#" id="twitter" class="social-networks">
            <i class='bx bxl-twitter'></i>
         </a>

         <!-- style="background: #1da1f2;" -->

         <a href="#" id="instagram" class="social-networks">
            <i class='bx bxl-instagram'></i>
         </a>
         <!-- style="background: #e3006c;" -->

         <a href="#" id="linkedin" class="social-networks">
            <i class='bx bxl-linkedin'></i>
         </a>
         <!-- style="background: #4267b2;" -->

      </div>

      <div class="botoes">
         <button class="botao">Contrate</button>
         <button class="botao">Mensagem</button>
      </div>

      <div class="analytics">

         <div class="data">
            <i class='bx bx-heart'></i>
            <span class="number">30</span>
         </div>

         <div class="data">
            <i class='bx bx-message-rounded'></i>
            <span class="number">20</span>
         </div>

         <div class="data">
            <i class='bx bx-share'></i>
            <span class="number">10</span>
         </div>

      </div>


   </div>

</body>

</html>
